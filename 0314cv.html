        body { font-family:'DM Sans',sans-serif; color:var(--ink); background:#fff; overflow-x:hidden; }

        ::-webkit-scrollbar { width:6px; }

        .fade-up-1 { animation-delay:0.1s; }
        .fade-up-2 { animation-delay:0.22s; }
        .fade-up-3 { animation-delay:0.36s; }
        .fade-up-4 { animation-delay:0.5s; }

        .btn-primary:hover { background:var(--accent); }
        .btn-secondary { border:1.5px solid var(--border); color:var(--ink); background:#fff; }
        .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
        .section-label { font-size:10px; font-weight:700; letter-spacing:0.3em; text-transform:uppercase; color:var(--muted); }
